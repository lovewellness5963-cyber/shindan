<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたのブランディングタイプ診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1a1208;--paper:#f5f0e8;--warm:#c8a96e;--accent:#8b4513;--soft:#e8dcc8;--muted:#7a6a55;--highlight:#d4956a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--paper);color:var(--ink);font-family:'Noto Serif JP',serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(200,169,110,0.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(139,69,19,0.08) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .container{max-width:680px;margin:0 auto;padding:48px 24px;position:relative;z-index:1;}
  .header{text-align:center;margin-bottom:52px;opacity:0;animation:fadeUp 0.8s ease forwards 0.1s;}
  .header-eyebrow{font-family:'DM Serif Display',serif;font-size:11px;letter-spacing:0.3em;color:var(--warm);text-transform:uppercase;margin-bottom:16px;}
  .header h1{font-family:'Shippori Mincho',serif;font-size:clamp(22px,5vw,30px);font-weight:700;line-height:1.5;color:var(--ink);margin-bottom:12px;}
  .header h1 em{font-style:italic;color:var(--accent);font-family:'DM Serif Display',serif;font-size:1.15em;}
  .header-line{width:48px;height:2px;background:var(--warm);margin:20px auto;}
  .header-sub{font-size:13px;color:var(--muted);line-height:1.8;}
  .progress-wrap{margin-bottom:36px;opacity:0;animation:fadeUp 0.8s ease forwards 0.3s;}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);letter-spacing:0.05em;margin-bottom:8px;}
  .progress-bar{height:3px;background:var(--soft);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--warm),var(--highlight));border-radius:2px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
  .question-card{background:white;border:1px solid rgba(200,169,110,0.3);border-radius:4px;padding:40px 36px;margin-bottom:20px;box-shadow:0 2px 20px rgba(26,18,8,0.06);opacity:0;animation:fadeUp 0.6s ease forwards 0.4s;}
  .q-number{font-family:'DM Serif Display',serif;font-size:11px;letter-spacing:0.25em;color:var(--warm);text-transform:uppercase;margin-bottom:16px;}
  .q-text{font-family:'Shippori Mincho',serif;font-size:clamp(16px,3.5vw,19px);font-weight:600;line-height:1.7;color:var(--ink);margin-bottom:32px;}
  .options{display:flex;flex-direction:column;gap:12px;}
  .option{cursor:pointer;border:1.5px solid var(--soft);border-radius:3px;padding:16px 20px;font-size:14px;line-height:1.6;color:var(--ink);background:white;transition:all 0.2s ease;text-align:left;font-family:'Noto Serif JP',serif;display:flex;align-items:flex-start;gap:12px;}
  .option:hover{border-color:var(--warm);background:#fdfaf5;transform:translateX(3px);}
  .option.selected{border-color:var(--accent);background:#fdf8f0;color:var(--accent);}
  .option-mark{width:20px;height:20px;border:1.5px solid currentColor;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;opacity:0.5;}
  .option.selected .option-mark{opacity:1;background:var(--accent);border-color:var(--accent);}
  .option.selected .option-mark::after{content:'';width:6px;height:6px;background:white;border-radius:50%;}
  .nav{display:flex;justify-content:flex-end;gap:12px;margin-top:8px;}
  .btn{font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:0.08em;padding:12px 28px;border-radius:2px;cursor:pointer;border:none;transition:all 0.2s ease;}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-primary:hover{background:var(--accent);transform:translateY(-1px);}
  .btn-primary:disabled{background:var(--soft);color:var(--muted);cursor:default;transform:none;}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--soft);}
  .btn-ghost:hover{border-color:var(--warm);color:var(--ink);}
  .result-wrap{display:none;opacity:0;animation:fadeUp 0.8s ease forwards;}
  .result-wrap.show{display:block;}
  .result-badge{text-align:center;margin-bottom:32px;}
  .result-type-label{font-family:'DM Serif Display',serif;font-size:11px;letter-spacing:0.35em;color:var(--warm);text-transform:uppercase;margin-bottom:12px;}
  .result-type-name{font-family:'Shippori Mincho',serif;font-size:clamp(26px,6vw,36px);font-weight:700;color:var(--accent);line-height:1.3;margin-bottom:8px;}
  .result-emoji{font-size:48px;margin-bottom:16px;display:block;}
  .result-card{background:white;border:1px solid rgba(200,169,110,0.3);border-radius:4px;padding:36px;margin-bottom:20px;box-shadow:0 2px 20px rgba(26,18,8,0.06);}
  .result-section-title{font-family:'DM Serif Display',serif;font-size:10px;letter-spacing:0.3em;color:var(--warm);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--soft);}
  .result-desc{font-size:14px;line-height:1.9;color:var(--ink);margin-bottom:24px;}
  .result-traits{list-style:none;margin-bottom:24px;}
  .result-traits li{font-size:13.5px;line-height:1.7;padding:8px 0;border-bottom:1px solid var(--soft);color:var(--ink);display:flex;gap:10px;}
  .result-traits li::before{content:'◆';color:var(--warm);font-size:8px;margin-top:5px;flex-shrink:0;}
  .result-advice{background:#fdf8f0;border-left:3px solid var(--warm);padding:20px;border-radius:0 3px 3px 0;font-size:13.5px;line-height:1.8;color:var(--ink);}
  .book-cta{background:linear-gradient(135deg,#1a1208 0%,#3a2510 100%);border:1px solid var(--warm);border-radius:4px;padding:36px;margin-top:24px;text-align:center;position:relative;overflow:hidden;}
  .book-label{font-family:'DM Serif Display',serif;font-size:10px;letter-spacing:0.35em;color:var(--warm);text-transform:uppercase;margin-bottom:10px;}
  .book-title{font-family:'Shippori Mincho',serif;font-size:clamp(17px,4vw,22px);font-weight:700;color:var(--paper);line-height:1.5;margin-bottom:8px;}
  .book-date{font-size:12px;color:var(--warm);letter-spacing:0.1em;margin-bottom:16px;}
  .book-desc{font-size:13px;color:#b0a090;line-height:1.8;margin-bottom:24px;max-width:480px;margin-left:auto;margin-right:auto;}
  .btn-kindle{display:inline-block;background:var(--warm);color:var(--ink);font-family:'Shippori Mincho',serif;font-size:14px;font-weight:700;padding:14px 36px;border-radius:2px;border:none;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;text-decoration:none;}
  .btn-kindle:hover{background:var(--highlight);transform:translateY(-2px);}
  .sns-section{background:white;border:1px solid rgba(200,169,110,0.3);border-radius:4px;padding:32px;margin-top:20px;}
  .sns-section-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;}
  .sns-section-sub{font-size:12px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
  .sns-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
  .sns-tab{font-family:'Noto Serif JP',serif;font-size:12px;padding:7px 14px;border-radius:2px;border:1.5px solid var(--soft);background:white;color:var(--muted);cursor:pointer;transition:all 0.2s;}
  .sns-tab:hover{border-color:var(--warm);color:var(--ink);}
  .sns-tab.active{border-color:var(--accent);color:var(--accent);background:#fdf8f0;font-weight:600;}
  .sns-post-text{width:100%;background:#fdfaf5;border:1.5px solid var(--soft);border-radius:3px;padding:16px;font-family:'Noto Serif JP',serif;font-size:13px;line-height:1.8;color:var(--ink);resize:none;min-height:180px;outline:none;transition:border-color 0.2s;}
  .sns-post-text:focus{border-color:var(--warm);}
  .sns-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
  .char-count{font-size:11px;color:var(--muted);}
  .btn-copy{font-family:'Noto Serif JP',serif;font-size:12px;padding:8px 20px;background:var(--ink);color:var(--paper);border:none;border-radius:2px;cursor:pointer;letter-spacing:0.05em;transition:all 0.2s;}
  .btn-copy:hover{background:var(--accent);}
  .btn-copy.copied{background:#4a7c4a;}
  .sns-open-btn{display:inline-block;margin-top:10px;font-size:12px;color:var(--warm);letter-spacing:0.05em;border-bottom:1px solid transparent;transition:border-color 0.2s;cursor:pointer;background:none;border-left:none;border-top:none;border-right:none;font-family:'Noto Serif JP',serif;padding:0;}
  .sns-open-btn:hover{border-bottom-color:var(--warm);}
  .intro{text-align:center;padding:20px 0 40px;opacity:0;animation:fadeUp 0.8s ease forwards 0.2s;}
  .intro-icon{font-size:52px;margin-bottom:24px;display:block;}
  .intro-body{font-size:14px;line-height:1.9;color:var(--muted);margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto;}
  .intro-tag{display:inline-block;font-size:11px;color:var(--accent);border:1px solid var(--warm);padding:3px 10px;border-radius:1px;margin:3px;letter-spacing:0.05em;}
  .tags-row{margin-bottom:28px;}
  .btn-start{background:var(--ink);color:var(--paper);font-family:'Shippori Mincho',serif;font-size:15px;padding:16px 48px;border:none;border-radius:2px;cursor:pointer;letter-spacing:0.1em;transition:all 0.25s;}
  .btn-start:hover{background:var(--accent);transform:translateY(-2px);}
  .q-time{font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:0.05em;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  .fade-slide{animation:fadeUp 0.45s ease both;}
</style>
</head>
<body>
<div class="container">
  <div id="introScreen">
    <div class="header">
      <div class="header-eyebrow">Branding Type Quiz</div>
      <h1>あなたの<em>ブランディング</em>タイプは？</h1>
      <div class="header-line"></div>
    </div>
    <div class="intro">
      <span class="intro-icon">✨</span>
      <div class="tags-row">
        <span class="intro-tag">ヨガ講師</span>
        <span class="intro-tag">ピラティス</span>
        <span class="intro-tag">フィットネス</span>
        <span class="intro-tag">パーソナルトレーナー</span>
        <span class="intro-tag">習い事の先生</span>
      </div>
      <p class="intro-body">
        「発信しているのになぜか刺さらない」<br>
        「自分らしさってどう出せばいいんだろう？」<br><br>
        あなたが<strong>本来持っているブランドの強み</strong>が<br>
        5問でわかります。
      </p>
      <button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
      <p class="q-time">全5問 ／ 約2分</p>
    </div>
  </div>

  <div id="quizScreen" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">Question 1 / 5</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="q-number" id="qNumber">Question 01</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>
    <div class="nav">
      <button class="btn btn-ghost" id="backBtn" onclick="prevQ()" style="display:none">← もどる</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>つぎへ →</button>
    </div>
  </div>

  <div id="resultScreen" class="result-wrap"></div>
</div>

<script>
const questions=[{text:"お客さんから「なぜあなたを選んだか」と聞かれたとき、一番多かった理由はどれですか？",options:[{text:"「雰囲気や世界観が好きで」と言われることが多い",scores:{A:3,B:0,C:1,D:0}},{text:"「発信の熱量や情報量に引かれて」と言われることが多い",scores:{A:0,B:3,C:0,D:1}},{text:"「知人に紹介してもらって」と言われることが多い",scores:{A:1,B:0,C:3,D:0}},{text:"「実績や資格を見て信頼できると思って」と言われることが多い",scores:{A:0,B:1,C:0,D:3}}]},{text:"SNSで発信するとき、一番自然にできることはどれですか？",options:[{text:"写真や言葉で「自分らしい世界観」を表現する",scores:{A:3,B:0,C:1,D:0}},{text:"役立つ情報や考えをどんどんアウトプットする",scores:{A:0,B:3,C:0,D:1}},{text:"コメントやDMで個別に関係を深める",scores:{A:1,B:0,C:3,D:0}},{text:"実績・経歴・資格など「根拠」を丁寧に伝える",scores:{A:0,B:1,C:0,D:3}}]},{text:"あなたのサービスを「一言で伝えて」と言われたら、どう答えますか？",options:[{text:"「〇〇な空間・体験を提供しています」という言い方が自然にでる",scores:{A:3,B:0,C:0,D:1}},{text:"「〇〇について誰よりも発信しています」という言い方が自然にでる",scores:{A:0,B:3,C:1,D:0}},{text:"「〇〇さんから紹介された方が多いです」という言い方が自然にでる",scores:{A:0,B:0,C:3,D:1}},{text:"「〇〇の資格・実績があります」という言い方が自然にでる",scores:{A:1,B:1,C:0,D:3}}]},{text:"理想のお客さんが来てくれたとき、どんな瞬間が一番うれしいですか？",options:[{text:"「あなたのInstagramを見てずっと来たかった！」と言われたとき",scores:{A:3,B:1,C:0,D:0}},{text:"「投稿がいつも参考になっていて」と言われたとき",scores:{A:0,B:3,C:0,D:1}},{text:"「〇〇さんから紹介されて来ました」と言われたとき",scores:{A:0,B:0,C:3,D:1}},{text:"「あなたの実績を調べて、ここしかないと思った」と言われたとき",scores:{A:1,B:0,C:0,D:3}}]},{text:"今のブランディングで、一番強化したいことはどれですか？",options:[{text:"世界観をもっと磨いて「あの人だけの雰囲気」を作りたい",scores:{A:3,B:0,C:1,D:0}},{text:"発信を増やして「この分野といえばこの人」になりたい",scores:{A:0,B:3,C:0,D:1}},{text:"紹介・口コミの仕組みをもっと整えたい",scores:{A:1,B:0,C:3,D:0}},{text:"実績や専門性をわかりやすく伝えられるようにしたい",scores:{A:0,B:1,C:0,D:3}}]}];

const results={
  A:{emoji:"🌸",name:"世界観ブランド",subtitle:"雰囲気・空気感で人を引き寄せる",desc:"あなたの強みは「世界観」です。写真、言葉、空間のトーン——すべてに一貫した「あなたらしさ」があり、それに共鳴した人が自然と集まってきます。技術や資格よりも「あの人の世界に入りたい」という感覚で選ばれるタイプです。",traits:["Instagramのフィードや雰囲気が整っていると言われる","「なんか好き」「センスがいい」と言われることが多い","世界観に共感したお客さんはリピート率が高い"],advice:"◎ さらに伸ばすために\n世界観は強力な武器ですが、「何のプロか」が伝わっていないと集客につながりにくいことも。ビジュアルの美しさに加えて、「私はこういう人を助けられる」というメッセージを言語化して添えるとさらに強くなります。"},
  B:{emoji:"📣",name:"発信力ブランド",subtitle:"熱量と情報量で「この分野の人」になる",desc:"あなたの強みは「発信の熱量と情報量」です。役立つ情報をどんどんアウトプットすることで「この分野といえばあの人」というポジションを自然に作れるタイプ。継続的な発信が信頼を積み上げていきます。",traits:["「いつも参考になる」「勉強になる」とよく言われる","フォロワーが増えやすく、情報を求めて来る人が多い","発信すればするほど認知が広がっていく感覚がある"],advice:"◎ さらに伸ばすために\n情報発信は得意なあなた。次のステップは「発信から購入」への導線を整えることです。有益な情報を届けたあと、「もっと深く学びたい方へ」という自然なCTAを添えることで、ファン→お客さんへの流れができます。"},
  C:{emoji:"🤝",name:"信頼関係ブランド",subtitle:"口コミ・紹介でじわじわ広がる",desc:"あなたの強みは「人との関係性」です。一人ひとりと丁寧に向き合うことで深い信頼が生まれ、紹介や口コミで自然と輪が広がっていくタイプ。SNSのフォロワー数より「つながりの質」が武器です。",traits:["お客さんからの紹介で来てくれる人が多い","長くつき合ってくれるリピーターが多い","個別対応やコミュニケーションを大切にしている"],advice:"◎ さらに伸ばすために\n関係性の深さは最大の強みですが、新規の人には届きにくいのが課題。紹介してもらいやすい仕組み（紹介カード・特典など）を整えると、口コミの連鎖がさらに加速します。"},
  D:{emoji:"💎",name:"専門性ブランド",subtitle:"実績・資格・知識で「この人しかいない」と選ばれる",desc:"あなたの強みは「専門性と実績」です。資格・経歴・実績をきちんと伝えることで「この人なら安心」という信頼を築けるタイプ。根拠のある情報発信が、あなたのブランドをより強固にします。",traits:["「実績を調べて来ました」という新規客が多い","専門的な内容を話すと「わかりやすい」と言われる","なんとなくではなく、根拠を持って行動することが多い"],advice:"◎ さらに伸ばすために\n専門性は強い武器ですが、「すごそうだけど近寄りがたい」と思われることも。実績・資格に加えて、あなたの「人となり」や「なぜこの仕事をしているか」というストーリーを発信すると、より多くの人に共感してもらえます。"}
};

let answers=[],current=0,selected=null,currentSnsTab='x';

function startQuiz(){document.getElementById('introScreen').style.display='none';document.getElementById('quizScreen').style.display='block';renderQuestion();}

function renderQuestion(){
  const q=questions[current];
  selected=answers[current]!==undefined?answers[current]:null;
  document.getElementById('qNumber').textContent=`Question ${String(current+1).padStart(2,'0')}`;
  document.getElementById('qText').textContent=q.text;
  document.getElementById('progressText').textContent=`Question ${current+1} / ${questions.length}`;
  const pct=Math.round((current/questions.length)*100);
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('backBtn').style.display=current>0?'inline-block':'none';
  document.getElementById('nextBtn').textContent=current===questions.length-1?'結果を見る ✨':'つぎへ →';
  document.getElementById('nextBtn').disabled=selected===null;
  const wrap=document.getElementById('optionsWrap');
  wrap.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option'+(selected===i?' selected':'');
    btn.innerHTML=`<span class="option-mark"></span><span>${opt.text}</span>`;
    btn.onclick=()=>selectOption(i);
    wrap.appendChild(btn);
  });
  const card=document.getElementById('questionCard');
  card.classList.remove('fade-slide');void card.offsetWidth;card.classList.add('fade-slide');
}

function selectOption(i){selected=i;answers[current]=i;document.querySelectorAll('.option').forEach((el,idx)=>el.classList.toggle('selected',idx===i));document.getElementById('nextBtn').disabled=false;}
function nextQ(){if(selected===null)return;answers[current]=selected;if(current<questions.length-1){current++;renderQuestion();}else showResult();}
function prevQ(){if(current>0){current--;renderQuestion();}}

function calcResult(){
  const totals={A:0,B:0,C:0,D:0};
  answers.forEach((ans,qi)=>{const scores=questions[qi].options[ans].scores;Object.keys(scores).forEach(k=>totals[k]+=scores[k]);});
  return Object.entries(totals).sort((a,b)=>b[1]-a[1])[0][0];
}

function switchTab(tab,el){
  currentSnsTab=tab;
  document.querySelectorAll('.sns-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  const text=window._sns[tab];
  document.getElementById('snsPostText').value=text;
  document.getElementById('charCount').textContent=text.length+'文字';
  const labels={x:'→ 𝕏 を開く',note:'→ noteを開く',instagram:'→ Instagramを開く',line:'→ LINEを開く',fb_page:'→ Facebookを開く',fb_group:'→ Facebookグループを開く'};
  document.getElementById('openSnsBtn').textContent=labels[tab]||'→ 開く';
  const btn=document.getElementById('copyBtn');btn.textContent='コピーする';btn.classList.remove('copied');
}

function copyPost(){
  navigator.clipboard.writeText(document.getElementById('snsPostText').value).then(()=>{
    const btn=document.getElementById('copyBtn');btn.textContent='コピーしました ✓';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='コピーする';btn.classList.remove('copied');},2000);
  });
}

function openSns(){
  const urls={x:'https://twitter.com/intent/tweet?text='+encodeURIComponent(document.getElementById('snsPostText').value),note:'https://note.com/',instagram:'https://www.instagram.com/',line:'https://line.me/',fb_page:'https://www.facebook.com/',fb_group:'https://www.facebook.com/groups/'};
  window.open(urls[currentSnsTab]||'#','_blank');
}

function retry(){
  answers=[];current=0;selected=null;
  const rs=document.getElementById('resultScreen');
  rs.classList.remove('show');rs.style.display='none';rs.innerHTML='';
  document.getElementById('introScreen').style.display='block';
}
</script>
