<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたの価格設定タイプ診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --warm: #c8a96e;
    --accent: #8b4513;
    --soft: #e8dcc8;
    --muted: #7a6a55;
    --highlight: #d4956a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(200,169,110,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(139,69,19,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.1s;
  }

  .header-eyebrow {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--warm);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 700;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 12px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--accent);
    font-family: 'DM Serif Display', serif;
    font-size: 1.15em;
  }

  .header-line {
    width: 48px;
    height: 2px;
    background: var(--warm);
    margin: 20px auto;
  }

  .header-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .progress-bar {
    height: 3px;
    background: var(--soft);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--warm), var(--highlight));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── QUESTION CARD ── */
  .question-card {
    background: white;
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 4px;
    padding: 40px 36px;
    margin-bottom: 20px;
    box-shadow: 0 2px 20px rgba(26,18,8,0.06), 0 0 0 1px rgba(200,169,110,0.1);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .q-number {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--warm);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .q-text {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(16px, 3.5vw, 19px);
    font-weight: 600;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 32px;
  }

  /* ── OPTIONS ── */
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    position: relative;
    cursor: pointer;
    border: 1.5px solid var(--soft);
    border-radius: 3px;
    padding: 16px 20px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    background: white;
    transition: all 0.2s ease;
    text-align: left;
    font-family: 'Noto Serif JP', serif;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .option:hover {
    border-color: var(--warm);
    background: #fdfaf5;
    transform: translateX(3px);
  }

  .option.selected {
    border-color: var(--accent);
    background: #fdf8f0;
    color: var(--accent);
  }

  .option-mark {
    width: 20px;
    height: 20px;
    border: 1.5px solid currentColor;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    opacity: 0.5;
  }

  .option.selected .option-mark {
    opacity: 1;
    background: var(--accent);
    border-color: var(--accent);
  }

  .option.selected .option-mark::after {
    content: '';
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
  }

  /* ── NAV ── */
  .nav {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 8px;
  }

  .btn {
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    padding: 12px 28px;
    border-radius: 2px;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
  }

  .btn-primary {
    background: var(--ink);
    color: var(--paper);
  }

  .btn-primary:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }

  .btn-primary:disabled {
    background: var(--soft);
    color: var(--muted);
    cursor: default;
    transform: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--soft);
  }

  .btn-ghost:hover {
    border-color: var(--warm);
    color: var(--ink);
  }

  /* ── RESULT ── */
  .result-wrap {
    display: none;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .result-wrap.show {
    display: block;
  }

  .result-badge {
    text-align: center;
    margin-bottom: 32px;
  }

  .result-type-label {
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--warm);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .result-type-name {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(26px, 6vw, 36px);
    font-weight: 700;
    color: var(--accent);
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .result-emoji {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  .result-card {
    background: white;
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 4px;
    padding: 36px;
    margin-bottom: 20px;
    box-shadow: 0 2px 20px rgba(26,18,8,0.06);
  }

  .result-section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--warm);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--soft);
  }

  .result-desc {
    font-size: 14px;
    line-height: 1.9;
    color: var(--ink);
    margin-bottom: 24px;
  }

  .result-traits {
    list-style: none;
    margin-bottom: 24px;
  }

  .result-traits li {
    font-size: 13.5px;
    line-height: 1.7;
    padding: 8px 0;
    border-bottom: 1px solid var(--soft);
    color: var(--ink);
    display: flex;
    gap: 10px;
  }

  .result-traits li::before {
    content: '◆';
    color: var(--warm);
    font-size: 8px;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .result-advice {
    background: #fdf8f0;
    border-left: 3px solid var(--warm);
    padding: 20px;
    border-radius: 0 3px 3px 0;
    font-size: 13.5px;
    line-height: 1.8;
    color: var(--ink);
  }

  .share-section {
    text-align: center;
    padding: 32px;
    background: var(--ink);
    border-radius: 4px;
    margin-top: 24px;
  }

  .share-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    color: var(--paper);
    margin-bottom: 6px;
  }

  .share-sub {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .btn-share {
    background: #1da1f2;
    color: white;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    padding: 12px 24px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin: 4px;
  }

  .btn-share:hover { opacity: 0.85; }

  .btn-retry {
    background: transparent;
    color: var(--paper);
    border: 1px solid var(--muted);
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 2px;
    cursor: pointer;
    margin-top: 12px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .btn-retry:hover { border-color: var(--warm); }

  /* ── BOOK CTA ── */
  .book-cta {
    background: linear-gradient(135deg, #1a1208 0%, #3a2510 100%);
    border: 1px solid var(--warm);
    border-radius: 4px;
    padding: 36px;
    margin-top: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .book-cta::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .book-label {
    font-family: 'DM Serif Display', serif;
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--warm);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .book-title {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(17px, 4vw, 22px);
    font-weight: 700;
    color: var(--paper);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .book-date {
    font-size: 12px;
    color: var(--warm);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  .book-desc {
    font-size: 13px;
    color: #b0a090;
    line-height: 1.8;
    margin-bottom: 24px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .btn-kindle {
    display: inline-block;
    background: var(--warm);
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    text-decoration: none;
  }

  .btn-kindle:hover {
    background: var(--highlight);
    transform: translateY(-2px);
  }

  /* ── SNS SHARE SECTION ── */
  .sns-section {
    background: white;
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 4px;
    padding: 32px;
    margin-top: 20px;
  }

  .sns-section-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .sns-section-sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .sns-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .sns-tab {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 2px;
    border: 1.5px solid var(--soft);
    background: white;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .sns-tab:hover { border-color: var(--warm); color: var(--ink); }

  .sns-tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: #fdf8f0;
    font-weight: 600;
  }

  .sns-post-wrap {
    position: relative;
  }

  .sns-post-text {
    width: 100%;
    background: #fdfaf5;
    border: 1.5px solid var(--soft);
    border-radius: 3px;
    padding: 16px;
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    line-height: 1.8;
    color: var(--ink);
    resize: none;
    min-height: 180px;
    outline: none;
    transition: border-color 0.2s;
  }

  .sns-post-text:focus { border-color: var(--warm); }

  .sns-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .char-count {
    font-size: 11px;
    color: var(--muted);
  }

  .btn-copy {
    font-family: 'Noto Serif JP', serif;
    font-size: 12px;
    padding: 8px 20px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .btn-copy:hover { background: var(--accent); }
  .btn-copy.copied { background: #4a7c4a; }

  .sns-open-btn {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    color: var(--warm);
    text-decoration: none;
    letter-spacing: 0.05em;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
    cursor: pointer;
    background: none;
    border-left: none;
    border-top: none;
    border-right: none;
    font-family: 'Noto Serif JP', serif;
    padding: 0;
  }

  .sns-open-btn:hover { border-bottom-color: var(--warm); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-slide {
    animation: fadeUp 0.45s ease both;
  }

  /* intro screen */
  .intro {
    text-align: center;
    padding: 20px 0 40px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.2s;
  }

  .intro-icon {
    font-size: 52px;
    margin-bottom: 24px;
    display: block;
  }

  .intro-body {
    font-size: 14px;
    line-height: 1.9;
    color: var(--muted);
    margin-bottom: 32px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  .intro-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--accent);
    border: 1px solid var(--warm);
    padding: 3px 10px;
    border-radius: 1px;
    margin: 3px;
    letter-spacing: 0.05em;
  }

  .tags-row {
    margin-bottom: 28px;
  }

  .btn-start {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    padding: 16px 48px;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.25s;
  }

  .btn-start:hover {
    background: var(--accent);
    transform: translateY(-2px);
  }

  .q-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="container">

  <!-- INTRO -->
  <div id="introScreen">
    <div class="header">
      <div class="header-eyebrow">Price Setting Quiz</div>
      <h1>あなたの<em>価格設定</em>タイプは？</h1>
      <div class="header-line"></div>
    </div>
    <div class="intro">
      <span class="intro-icon">💎</span>
      <div class="tags-row">
        <span class="intro-tag">ヨガ講師</span>
        <span class="intro-tag">ピラティス</span>
        <span class="intro-tag">フィットネス</span>
        <span class="intro-tag">セラピスト</span>
        <span class="intro-tag">カルチャースクール</span>
      </div>
      <p class="intro-body">
        「相場より高く取れない…」<br>
        「値上げしたらお客さんが離れそう」<br>
        そんな悩みの<strong>根本にある思い込み</strong>がわかります。<br><br>
        5問・約2分で診断できます。
      </p>
      <button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
      <p class="q-time">全5問 ／ 約2分</p>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quizScreen" style="display:none;">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progressText">Question 1 / 5</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="q-number" id="qNumber">Question 01</div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>

    <div class="nav">
      <button class="btn btn-ghost" id="backBtn" onclick="prevQ()" style="display:none">← もどる</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" disabled>つぎへ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultScreen" class="result-wrap"></div>

</div>

<script>
const questions = [
  {
    text: "レッスンや施術の料金を決めるとき、まず何を調べますか？",
    options: [
      { text: "近くの同業者や相場を調べて、その範囲に合わせる", scores: { A: 3, B: 0, C: 0, D: 1 } },
      { text: "自分の経費（家賃・材料費など）を計算して決める", scores: { A: 0, B: 3, C: 1, D: 0 } },
      { text: "自分が提供する価値や変化をベースに考える", scores: { A: 0, B: 0, C: 3, D: 1 } },
      { text: "なんとなく決めていて、深く考えたことがない", scores: { A: 1, B: 1, C: 0, D: 3 } },
    ]
  },
  {
    text: "「高すぎる」と言われたら、あなたはどう感じますか？",
    options: [
      { text: "すぐ値下げしたくなる（断られるのが怖い）", scores: { A: 2, B: 1, C: 0, D: 2 } },
      { text: "「そうかも…」と自信をなくしてしまう", scores: { A: 1, B: 2, C: 0, D: 2 } },
      { text: "「この人には合わない」と思い、動じない", scores: { A: 0, B: 0, C: 3, D: 0 } },
      { text: "モヤモヤしながらも値段を据え置く", scores: { A: 1, B: 1, C: 1, D: 1 } },
    ]
  },
  {
    text: "値上げを検討したとき、一番大きかった不安は？",
    options: [
      { text: "「お客さんが来なくなるかも」", scores: { A: 3, B: 0, C: 0, D: 1 } },
      { text: "「自分にそれだけの価値があるの？」", scores: { A: 0, B: 1, C: 0, D: 3 } },
      { text: "「周りと比べて高くなりすぎる」", scores: { A: 2, B: 1, C: 0, D: 1 } },
      { text: "とくに不安を感じず、自分の基準で決めている", scores: { A: 0, B: 0, C: 3, D: 0 } },
    ]
  },
  {
    text: "理想のお客さんに来てもらうために、どんな行動をしていますか？",
    options: [
      { text: "値段を下げてハードルを低くする", scores: { A: 3, B: 0, C: 0, D: 1 } },
      { text: "サービス内容を増やして「お得感」を出す", scores: { A: 1, B: 3, C: 0, D: 0 } },
      { text: "世界観やコンセプトを発信して共感を集める", scores: { A: 0, B: 0, C: 3, D: 1 } },
      { text: "とくに意識した行動はできていない", scores: { A: 1, B: 0, C: 0, D: 3 } },
    ]
  },
  {
    text: "あなたが「稼ぐこと」についてのイメージに近いのは？",
    options: [
      { text: "稼ぐのは少し「がめつい」ような気がする", scores: { A: 1, B: 0, C: 0, D: 3 } },
      { text: "コツコツ積み上げれば、いつか報われると思う", scores: { A: 0, B: 3, C: 0, D: 1 } },
      { text: "好きなことでしっかり稼ぐのは当然のことだ", scores: { A: 0, B: 0, C: 3, D: 0 } },
      { text: "稼げたらいいけど、強く主張するのは苦手", scores: { A: 3, B: 0, C: 0, D: 1 } },
    ]
  }
];

const results = {
  A: {
    emoji: "🌊",

let answers = [];
let current = 0;
let selected = null;

function startQuiz() {
  document.getElementById('introScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  selected = answers[current] !== undefined ? answers[current] : null;

  document.getElementById('qNumber').textContent = `Question ${String(current+1).padStart(2,'0')}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressText').textContent = `Question ${current+1} / ${questions.length}`;

  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('backBtn').style.display = current > 0 ? 'inline-block' : 'none';
  document.getElementById('nextBtn').textContent = current === questions.length - 1 ? '結果を見る ✨' : 'つぎへ →';
  document.getElementById('nextBtn').disabled = selected === null;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option' + (selected === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-mark"></span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i);
    wrap.appendChild(btn);
  });

  const card = document.getElementById('questionCard');
  card.classList.remove('fade-slide');
  void card.offsetWidth;
  card.classList.add('fade-slide');
}

function selectOption(i) {
  selected = i;
  answers[current] = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('nextBtn').disabled = false;
}

function nextQ() {
  if (selected === null) return;
  answers[current] = selected;
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (current > 0) {
    current--;
    renderQuestion();
  }
}

function calcResult() {
  const totals = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach((ans, qi) => {
    const scores = questions[qi].options[ans].scores;
    Object.keys(scores).forEach(k => totals[k] += scores[k]);
  });
  return Object.entries(totals).sort((a,b) => b[1]-a[1])[0][0];
}

        <button class="sns-open-btn" id="openSnsBtn" onclick="openSns()">→ 𝕏 を開く</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:28px">
      <button class="btn-retry" style="color:var(--muted);border:1px solid var(--soft);background:transparent;font-family:'Noto Serif JP',serif;font-size:12px;padding:10px 20px;border-radius:2px;cursor:pointer;letter-spacing:.05em" onclick="retry()">もう一度診断する</button>
    </div>
  `;
  el.classList.add('show');

  // Store sns data for tab switching
  window._currentSns = sns;
  window._currentTypeKey = typeKey;

  document.getElementById('snsPostText').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length + '文字';
  });
}

function switchTab(tab, el) {
  currentSnsTab = tab;
  document.querySelectorAll('.sns-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  const text = window._currentSns[tab];
  document.getElementById('snsPostText').value = text;
  document.getElementById('charCount').textContent = text.length + '文字';

  const openBtn = document.getElementById('openSnsBtn');
  const labels = {
    x: '→ 𝕏 を開く',
    note: '→ noteを開く',
    instagram: '→ Instagramを開く',
    line: '→ LINEを開く',
    fb_page: '→ Facebookを開く',
    fb_group: '→ Facebookグループを開く'
  };
  openBtn.textContent = labels[tab] || '→ 開く';

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'コピーする';
  copyBtn.classList.remove('copied');
}

function copyPost() {
  const text = document.getElementById('snsPostText').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'コピーしました ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピーする';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function openSns() {
  const urls = {
    x: 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(document.getElementById('snsPostText').value),
    note: 'https://note.com/',
    instagram: 'https://www.instagram.com/',
    line: 'https://line.me/',
    fb_page: 'https://www.facebook.com/',
    fb_group: 'https://www.facebook.com/groups/'
  };
  window.open(urls[currentSnsTab] || '#', '_blank');
}

function retry() {
  answers = [];
  current = 0;
  selected = null;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('resultScreen').innerHTML = '';
  document.getElementById('introScreen').style.display = 'block';
}
</script>
</body>
</html>
